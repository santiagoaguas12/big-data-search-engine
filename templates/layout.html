<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Motor de búsqueda académico BM25 sobre Emprendimiento Tecnológico" />
    <title>{% block title %}MySearchEngine{% endblock %} — Emprendimiento Tecnológico</title>

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Estilos propios -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />

    {% block extra_head %}{% endblock %}
</head>
<body>

    <!-- ====================================================
         HEADER
    ==================================================== -->
    <header class="site-header">
        <div class="container header-inner">

            <!-- Marca y subtítulo -->
            <a href="{{ url_for('index') }}" class="brand">
                <span class="brand-icon" aria-hidden="true">&#9906;</span>
                <div class="brand-text">
                    <span class="brand-name">MySearchEngine</span>
                    <span class="brand-sub">Technological Entrepreneurship &middot; BM25</span>
                </div>
            </a>

            <!-- Navegación -->
            <nav class="site-nav" aria-label="Navegación principal">
                <a href="{{ url_for('index') }}"
                   class="nav-link{% if request.endpoint in ('index', 'search') %} nav-link--active{% endif %}">
                    Búsqueda
                </a>
                <a href="{{ url_for('index_visualization') }}"
                   class="nav-link{% if request.endpoint == 'index_visualization' %} nav-link--active{% endif %}">
                    Índice
                </a>
                <a href="{{ url_for('api_stats') }}" class="nav-link nav-link--api"
                   target="_blank" rel="noopener" title="Ver estadísticas en JSON">
                    API&nbsp;Stats
                </a>
            </nav>

        </div>
    </header>

    <!-- ====================================================
         CONTENIDO PRINCIPAL
    ==================================================== -->
    <main class="site-main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- ====================================================
         FOOTER
    ==================================================== -->
    <footer class="site-footer">
        <div class="container footer-inner">
            <div class="footer-left">
                <p class="footer-title">MySearchEngine</p>
                <p class="footer-sub">Information Retrieval &middot; Big Data &middot; Proyecto Académico</p>
            </div>
            <div class="footer-right">
                <span class="footer-badge">BM25</span>
                <span class="footer-badge">Inverted Index</span>
                <span class="footer-badge">Porter Stemmer</span>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='app.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
